<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda Pro Real Signals</title>
    <style>
        /* Pura layout set karne ke liye CSS */
        body { 
            background: #000; 
            color: #00f2ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Upar ki patti jisme meter hai */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 20px; 
            background: #050505; 
            border-bottom: 2px solid #00f2ff;
            height: 130px;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);
        }

        .logo-section h2 {
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* Meter ka container */
        .meter-container {
            width: 400px;
            height: 120px;
            overflow: hidden;
        }

        /* Chart ki window full screen karne ke liye */
        #chart-container { 
            flex-grow: 1; 
            position: relative; 
            width: 100%; 
        }

        #tv_chart { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-section">
            <h2>🦅 GARUDA PRO</h2>
            <p style="margin: 5px 0 0 0; font-size: 10px; color: #888;">REAL-TIME AI ANALYSIS</p>
        </div>

        <div class="meter-container">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "15m",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "BINANCE:BTCUSDT",
                    "showIntervalTabs": false,
                    "displayMode": "single",
                    "locale": "in",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>

    <div id="chart-container">
        <div id="tv_chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "15",
            "timezone": "Asia/Kolkata",
            "theme": "dark",
            "style": "1",
            "locale": "in",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "hide_legend": false,
            "save_image": false,
            "container_id": "tv_chart",
            "studies": [
                "RSI@tv-basicstudies",
                "MASimple@tv-basicstudies"
            ],
            "show_popup_button": true,
            "popup_width": "1000",
            "popup_height": "650"
        });
    </script>
</body>
</html>
